<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- MathJax for LaTeX -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['$$', '$$']],
        processEscapes: true,
        tags: 'ams'
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    :root {
      --bg:           #fafaf8;
      --surface:      #ffffff;
      --border:       #e8e4de;
      --text-primary: #1a1814;
      --text-body:    #2d2a25;
      --text-muted:   #6b6560;
      --text-caption: #4a4540;
      --accent:       #c0392b;
      --accent-soft:  #fdf2f0;
      --accent-link:  #b03224;
      --code-bg:      #f3f1ec;
      --max-width:    720px;
      --fig-width:    1080px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 18px; scroll-behavior: smooth; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text-body);
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .site-header {
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header a {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .site-header a:hover { color: var(--accent); }

    /* ── Hero / Title block ── */
    .hero {
      max-width: var(--fig-width);
      margin: 0 auto;
      padding: 4rem 2rem 2.5rem;
      text-align: center;
    }
    .post-date {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.2rem;
    }
    .post-title {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      line-height: 1.25;
      color: var(--text-primary);
      margin-bottom: 1.6rem;
      letter-spacing: -0.01em;
    }
    .authors {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.3rem 1.5rem;
      margin-bottom: 1.8rem;
    }
    .author-item {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text-body);
    }
    .author-affil {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .hero-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }
    .hero-link {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.45rem 1.1rem;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      text-decoration: none;
      color: var(--text-body);
      background: var(--surface);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      letter-spacing: 0.02em;
    }
    .hero-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }
    .abstract {
      max-width: 640px;
      margin: 0 auto 1rem;
      font-size: 0.95rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.7;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    /* ── Divider ── */
    .title-divider {
      max-width: var(--fig-width);
      margin: 0 auto 3rem;
      padding: 0 2rem;
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── Main content ── */
    .post-body {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    /* ── Typography ── */
    .post-body h2 {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 3rem 0 1rem;
      padding-top: 0.5rem;
      border-top: 2px solid var(--accent);
      display: inline-block;
    }
    .post-body h3 {
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 2.2rem 0 0.7rem;
      letter-spacing: 0.01em;
    }
    .post-body h4 {
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin: 1.8rem 0 0.5rem;
    }
    .post-body p { margin-bottom: 1.3rem; }

    .post-body a { color: var(--accent-link); text-decoration: underline; text-underline-offset: 2px; }
    .post-body a:hover { color: var(--accent); }

    .post-body ul, .post-body ol {
      margin: 0.8rem 0 1.3rem 1.5rem;
    }
    .post-body li { margin-bottom: 0.35rem; }

    .post-body strong { font-weight: 600; color: var(--text-primary); }
    .post-body em { font-style: italic; }

    /* Blockquote */
    .post-body blockquote {
      border-left: 3px solid var(--accent);
      margin: 1.8rem 0;
      padding: 0.8rem 1.4rem;
      background: var(--accent-soft);
      border-radius: 0 4px 4px 0;
    }
    .post-body blockquote p { margin: 0; color: var(--text-caption); font-style: italic; }

    /* Code */
    .post-body code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82em;
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      color: var(--text-primary);
    }
    .post-body pre {
      background: #1e1c18;
      border-radius: 6px;
      padding: 1.2rem 1.4rem;
      overflow-x: auto;
      margin: 1.5rem 0 1.8rem;
    }
    .post-body pre code {
      background: none;
      color: #e8e4d9;
      font-size: 0.8rem;
      padding: 0;
    }

    /* ── Figures & Videos ── */
    .post-figure {
      max-width: var(--fig-width);
      margin: 2.5rem calc(50% - var(--fig-width)/2);
      padding: 0 1rem;
      width: var(--fig-width);
    }
    /* fallback for narrow viewports */
    @media (max-width: calc(var(--fig-width) + 4rem)) {
      .post-figure {
        max-width: 100%;
        width: 100%;
        margin: 2.5rem 0;
        padding: 0;
      }
    }
    .post-figure img,
    .post-figure video {
      width: 100%;
      display: block;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .post-figure video { background: #000; }

    /* Side-by-side row layout */
    .fig-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }
    .fig-block-row + .fig-block-row { margin-top: 0.75rem; }
    .fig-row-item {
      flex: 1 1 0;
      min-width: 0;
    }
    .fig-row-item img,
    .fig-row-item video {
      width: 100%;
      display: block;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .fig-row-item video { background: #000; }
    /* forced aspect ratio: set via data-ratio on .fig-row */
    .fig-row[data-ratio] .fig-row-item {
      position: relative;
    }
    .fig-row[data-ratio] .fig-row-item::before {
      content: '';
      display: block;
      padding-top: var(--fig-ratio-pt, 56.25%); /* default 16/9 */
    }
    .fig-row[data-ratio] .fig-row-item img,
    .fig-row[data-ratio] .fig-row-item video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .figure-subcaption {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 0.35rem;
    }

    .figure-caption {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      line-height: 1.6;
      color: var(--text-caption);
      margin-top: 0.75rem;
      padding: 0 0.1rem;
    }
    .figure-caption strong { color: var(--text-body); }

    /* Horizontal rule */
    .post-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ── MathJax override ── */
    mjx-container { overflow-x: auto; }

    /* ── Print ── */
    @media print {
      .site-header, .site-footer { display: none; }
      .post-body { padding: 0; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="/">← Home</a>
</header>

<article>
  <div class="hero">
    <div class="post-date">{{DATE}}</div>
    <h1 class="post-title">{{TITLE}}</h1>
    {{AUTHORS_HTML}}
    {{LINKS_HTML}}
    {{ABSTRACT_HTML}}
  </div>
  <hr class="title-divider">
  {{CONTENT}}
</article>

<footer class="site-footer">
  {{TITLE}} · {{DATE}}
</footer>

</body>
</html>
