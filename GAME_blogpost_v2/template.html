<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --text-width: 1080px; 
            --bg-color: #ffffff;
            --accent: #000;
        }
        
        body { 
            font-family: 'Crimson Pro', serif; 
            line-height: 1.7; 
            color: #1a1a1a; 
            margin: 0; 
            background: var(--bg-color); 
            font-size: 1.25rem; 
        }

        /* ── Full Width Teaser ── */
        .teaser-outer {
            width: 100%;
            background: #ffffff;
            padding-bottom: 2rem; /* Space for the main caption below the videos */
        }

        .teaser-container {
            width: 100%;
            display: flex;
            overflow: hidden;
        }

        .teaser-item {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        .teaser-item video {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
        }

        /* Sub-labels (a, b, c...) */
        .teaser-label {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: #888;
            margin-top: 12px;
            text-align: center;
        }

        /* Main caption below the whole strip */
        .teaser-main-caption {
            max-width: var(--text-width); /* Matches your article width */
            margin: 1.5rem auto 0;
            padding: 0 20px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
        }

        /* ── Main Content Justification ── */
        .container, .post-body { 
            max-width: var(--text-width); 
            margin: 0 auto; 
            padding: 0 20px; 
            
            /* Justify the text */
            text-align: justify;
            
            /* Optional: Improves the look of justified text on narrow screens */
            hyphens: auto;
            -webkit-hyphens: auto;
            -ms-hyphens: auto;
        }

        /* Ensure headers remain left-aligned for better readability */
        .container h1, 
        .container h2, 
        .container h3 {
            text-align: left;
        }
        
        header { text-align: center; padding: 4rem 0 3rem; }
        h1 { font-size: 3.2rem; line-height: 1.1; margin-bottom: 1rem; font-weight: 700; }
        
        .date { font-family: 'Inter', sans-serif; color: #666; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1.5px; }
        
        .authors { display: flex; justify-content: center; flex-wrap: wrap; gap: 24px; margin: 2rem 0; }
        .author { display: flex; flex-direction: column; align-items: center; font-family: 'Inter', sans-serif; font-size: 0.95rem; }
        .affil { color: #888; font-size: 0.8rem; margin-top: 2px; }

        .links { display: flex; justify-content: center; gap: 12px; margin-bottom: 3rem; }
        .btn { 
            font-family: 'Inter', sans-serif; 
            text-decoration: none; 
            color: #000; 
            border: 1px solid #ddd; 
            padding: 8px 16px; 
            border-radius: 4px; 
            font-size: 0.85rem; 
            transition: all 0.2s; 
        }
        .btn:hover { background: #fafaf8; border-color: #bbb; }

        /* ── Updated Abstract Styling ── */
        .abstract-section {
            max-width: 1080px;
            margin: 0 auto 3rem;
            border-top: 1px solid var(--border);
            padding-top: 0rem;
        }

        .abstract-section p {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin: 0;
            /* FIX: Justify the text */
            text-align: justify;
        }

        /* Figure Styling */
        .post-figure {
            max-width: 100%;
            margin: 3rem 0;
            text-align: center;
        }

        .post-figure img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .figure-caption {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: #666;
            margin-top: 1rem;
            text-align: left;
            line-height: 1.5;
        }

        /* BibTeX Fix (Black background, orange text) */
        .post-body pre {
            background: #1a1a1a !important; 
            border-radius: 6px;
            padding: 1.5rem;
        }

        .post-body pre code {
            color: #ffbb00 !important;
            background: transparent !important;
        }
        /* --- Citation Tooltip --- */
        .cite-ref {
            color: #007bff;
            cursor: help;
            position: relative;
            padding: 0 1px; /* Makes the number slightly easier to hover */
            font-size: 0.9em;
            vertical-align: super;
        }

        .cite-ref:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 150%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            width: 250px;
            line-height: 1.4;
            z-index: 100;
            font-family: 'Inter', sans-serif;
            font-style: normal;
            text-align: left;
        }

        /* The entire [1, 2] block */
        .cite-ref-group {
            color: #007bff;          /* Blue brackets */
            font-size: 0.85em;       /* Slightly smaller */
            vertical-align: baseline;   /* Above the text line */
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: default;
        }

        /* The numbers inside the brackets */
        .cite-ref-num {
            color: #007bff;          /* Blue numbers */
            cursor: help;            /* Show help cursor on hover */
            transition: color 0.2s;
            position: relative;
        }

        .cite-ref-num:hover {
            color: #0056b3;          /* Darker blue on hover */
            text-decoration: underline;
        }

        /* Tooltip (remains the same) */
        .cite-ref-num:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 180%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            width: 280px;
            line-height: 1.4;
            z-index: 100;
            font-weight: 400;
        }

        /* --- References List --- */
        .references-section {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
        }

        .references-section h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .references-section ol {
            font-size: 0.95rem;
            color: #555;
            padding-left: 1.5rem;
        }

        .references-section li {
            margin-bottom: 0.5rem;
        }
        /* ── Updated Code/BibTeX Styling ── */
        .post-body pre {
            background: rgb(98, 255, 7); /* Dark background */
            border-radius: 6px;
            padding: 1.2rem 1.4rem;
            overflow-x: auto;
            margin: 1.5rem 0 1.8rem;
            /* Ensure no unexpected white borders or shadows */
            border: none; 
        }

        .post-body pre code {
            background: transparent; /* Remove white/highlight background */
            color: #ffbb00;          /* Off-white text for readability */
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            padding: 0;
            line-height: 1.5;
            /* Reset any inherited highlighting from markdown extensions */
            box-shadow: none;
            text-shadow: none;
        }

        /* Specific fix for BibTeX header if you write it as a header */
        .post-body h2 + pre {
            margin-top: 0.5rem;
        }

        /* ── Direct-on-background Figures ── */
        .content img, .content video {
            width: 100%;
            height: auto;
            margin: 1.5rem 0;
            /* Removed borders/backgrounds for the flat look */
            border: none; 
            box-shadow: none;
        }

        /* ── Typography & Headers ── */
        h2 { font-family: 'Inter', sans-serif; font-size: 1.8rem; margin-top: 4rem; font-weight: 600; }
        p { margin-bottom: 1.6rem; }
        
        code { font-family: monospace; background: #f4f4f400; padding: 2px 5px; border-radius: 3px; font-size: 0.9em; }
        pre { background: #1e1e1e; color: #efefef; padding: 1.5rem; border-radius: 8px; overflow-x: auto; font-size: 0.9rem; }
        
        blockquote { 
            border-left: 4px solid #000; 
            margin: 2rem 0; 
            padding: 0.5rem 1.5rem; 
            background: #f9f9f9;
        }

        /* Side-by-side helper class if you use HTML in MD */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 2rem 0; }
    </style>
</head>
<body>
    <div class="teaser-outer">
        <div class="teaser-container">
            {{TEASER_ITEMS}}
        </div>
        <div class="teaser-main-caption">
            {{TEASER_CAPTION}}
        </div>
    </div>

    <div class="container">
        <header>
            <div class="date">{{DATE}}</div>
            <h1>{{TITLE}}</h1>
            <div class="authors">{{AUTHORS}}</div>
            <div class="links">{{LINKS}}</div>
        </header>

        <section class="abstract">
            {{ABSTRACT}}
        </section>

        <article class="content">
            {{CONTENT}}
        </article>
        
        <footer style="padding: 5rem 0; text-align: center; color: #999; font-size: 0.8rem; font-family: 'Inter', sans-serif;">
            © 2026 · {{TITLE}}
        </footer>
    </div>

</body>
</html>
